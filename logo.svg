<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" fill="none">
  <defs>
    <linearGradient id="metallic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#cfd5db"/>
      <stop offset="50%" stop-color="#9aa2ab"/>
      <stop offset="70%" stop-color="#cfd5db"/>
      <stop offset="100%" stop-color="#60666d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Left C -->
  <path d="M 54.8 38.4 A 18 18 0 1 0 54.8 61.6" stroke="url(#metallic)" stroke-width="7.5" stroke-linecap="round" filter="url(#shadow)"/>
  
  <!-- Right C -->
  <path d="M 72.8 38.4 A 18 18 0 1 0 72.8 61.6" stroke="url(#metallic)" stroke-width="7.5" stroke-linecap="round" filter="url(#shadow)"/>
  
  <!-- Left C bottom-overlap (to interlock) -->
  <path d="M 23 50 A 18 18 0 0 0 54.8 61.6" stroke="url(#metallic)" stroke-width="7.5" stroke-linecap="round"/>
</svg>
